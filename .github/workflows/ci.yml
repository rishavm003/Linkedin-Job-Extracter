name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  test-pipeline:
    name: Test scraper + NLP pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd jobextractor
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run pipeline tests
        run: |
          cd jobextractor
          pytest tests/test_pipeline.py -v \
            --ignore=tests/test_pipeline.py::TestLiveScrapers \
            -k "not live"
        env:
          DATABASE_URL: ""
          REDIS_URL: ""

  test-backend:
    name: Test FastAPI backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jobuser
          POSTGRES_PASSWORD: jobpass
          POSTGRES_DB: jobextractor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r jobextractor/requirements.txt
          pip install -r backend/requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run backend tests
        run: |
          cd backend
          pytest tests/ -v -k "not live"
        env:
          DATABASE_URL: postgresql://jobuser:jobpass@localhost:5432/jobextractor_test
          REDIS_URL: ""
          ELASTICSEARCH_URL: ""
          ADZUNA_APP_ID: test
          ADZUNA_APP_KEY: test
          APYHUB_API_KEY: test
          RAPIDAPI_KEY: test

  test-frontend:
    name: Build Next.js frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker-build:
    name: Verify Docker builds
    runs-on: ubuntu-latest
    needs: [test-pipeline, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Create test .env
        run: |
          cp .env.example .env
          sed -i 's/PASTE_YOUR.*/_test_value/g' .env

      - name: Build pipeline image
        run: docker build -f jobextractor/Dockerfile -t pipeline:test .

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t backend:test .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t frontend:test .
